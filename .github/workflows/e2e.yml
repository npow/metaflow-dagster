name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run e2e tests
        env:
          METAFLOW_DEFAULT_DATASTORE: local
          METAFLOW_DEFAULT_METADATA: local
          METAFLOW_DATASTORE_SYSROOT_LOCAL: ${{ runner.temp }}/mf-ds
        run: |
          # test_launch.py covers the full Dagster run-lifecycle path:
          #   compile → execute_job(recon_job, instance=instance)
          #   → run persisted in Dagster SQLite DB (SyncInMemoryRunLauncher, no daemon)
          #   → Metaflow steps execute as subprocesses
          #   → Metaflow artifacts appear in local datastore
          pytest -v -m e2e \
            --timeout=300 \
            --tb=short \
            -x
