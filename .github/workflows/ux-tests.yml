name: UX Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # nightly — catches upstream metaflow regressions
  workflow_dispatch:

jobs:
  ux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      METAFLOW_DEFAULT_METADATA: local
      METAFLOW_DEFAULT_DATASTORE: local
      METAFLOW_DEFAULT_ENVIRONMENT: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"

      # Dagster jobs are executed via execute_job() with SyncInMemoryRunLauncher
      # and a SQLite-backed DagsterInstance.  This runs Metaflow steps as real
      # subprocesses via the multiprocess executor — no daemon or webserver needed.

      # setup-miniconda@v3 adds /usr/share/miniconda/condabin to PATH but not
      # the full conda/mamba bin directory.  Metaflow's @conda decorator resolves
      # mamba/conda by searching PATH directly, so we must add the bin directory
      # explicitly here.  Dagster subprocess workers inherit os.environ from the
      # parent process (via _build_env()), so this PATH entry is visible to them.
      - name: Add conda bin to PATH for subprocess access
        run: echo "/usr/share/miniconda/bin" >> $GITHUB_PATH


      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: ".[test]"
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          # Use a higher per-test timeout (600s) because dagster jobs run steps
          # as subprocesses via the multiprocess executor and can be slow on
          # shared CI runners, especially for flows with retries.
          # --dist=loadfile keeps tests from the same file on the same worker so
          # both @conda tests (in test_basic.py) run sequentially on one worker,
          # preventing micromamba repodata SOLV file races between parallel workers.
          test-files: "test_basic.py test_config.py test_dag.py test_resume.py"
          pytest-args: "-n 4 --dist=loadfile -v --tb=short --timeout=600 --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: dagster
                scheduler_type: dagster
                cluster: null
                decospec: null
                enabled: true

  test-report:
    if: always()
    needs: [ux-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all JUnit XML artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: junit-artifacts/

      - name: Publish combined test report
        uses: dorny/test-reporter@v1
        with:
          name: "Test Results — All Backends"
          path: "junit-artifacts/**/*.xml"
          reporter: java-junit
          fail-on-error: false
