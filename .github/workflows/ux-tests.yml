name: UX Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # nightly — catches upstream metaflow regressions
  workflow_dispatch:

jobs:
  ux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      METAFLOW_DEFAULT_METADATA: local
      METAFLOW_DEFAULT_DATASTORE: local
      METAFLOW_DEFAULT_ENVIRONMENT: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"

      # Dagster jobs are executed via execute_job() with SyncInMemoryRunLauncher
      # and a SQLite-backed DagsterInstance.  This runs Metaflow steps as real
      # subprocesses via the multiprocess executor — no daemon or webserver needed.

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: ".[test]"
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          # Conda steps run inside Dagster subprocess workers which don't
          # inherit the conda environment from the parent process, so @conda
          # cannot bootstrap correctly. Disable conda tests for this backend.
          conda: "false"
          # Use a higher per-test timeout (600s) because dagster jobs run steps
          # as subprocesses via the multiprocess executor and can be slow on
          # shared CI runners, especially for flows with retries.
          pytest-args: "-n 4 -v --tb=short --timeout=600 --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: dagster
                scheduler_type: dagster
                cluster: null
                decospec: null
                enabled: true
